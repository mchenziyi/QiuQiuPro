<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球球 - QiuQiuPro</title>
<style>
:root {
  /* Dark theme (default) */
  --bg-primary: #1C1C1E;
  --bg-secondary: #151517;
  --bg-surface: #252527;
  --bg-elevated: #2C2C2E;
  --text-primary: #E5E5EA;
  --text-secondary: #8E8E93;
  --text-muted: #636366;
  --border-color: #2C2C2E;
  --border-light: #3A3A3C;
  --accent: #3B82F6;
  --accent-text: #3B82F6;
  --green: #34C759;
  --green-bg: #1A3D1A;
  --green-text: #50C878;
  --red-bg: #3D1A1A;
  --red-text: #FF6B6B;
  --yellow-bg: #282420;
  --yellow-text: #B8943C;
  --code-bg: #1C1C1E;
  --msg-user-color: #E5E5EA;
  --composer-bg: #252527;
  --inspector-content: #8E8E93;
}
[data-theme="light"] {
  --bg-primary: #F5F5F7;
  --bg-secondary: #FFFFFF;
  --bg-surface: #FFFFFF;
  --bg-elevated: #E8E8ED;
  --text-primary: #1D1D1F;
  --text-secondary: #86868B;
  --text-muted: #B0B0B5;
  --border-color: #D2D2D7;
  --border-light: #D2D2D7;
  --accent: #0071E3;
  --accent-text: #0071E3;
  --green: #34C759;
  --green-bg: #E8F8E8;
  --green-text: #1A8C1A;
  --red-bg: #FDE8E8;
  --red-text: #C41E1E;
  --yellow-bg: #FEF7E0;
  --yellow-text: #9A7B1E;
  --code-bg: #F5F5F7;
  --msg-user-color: #1D1D1F;
  --composer-bg: #FFFFFF;
  --inspector-content: #86868B;
  --diff-del-bg: #2D1515;
  --diff-del-text: #8A5A5A;
  --diff-del-highlight: #6B2020;
  --diff-del-highlight-text: #FF9999;
  --diff-add-bg: #152D15;
  --diff-add-text: #5A8A5A;
  --diff-add-highlight: #206B20;
  --diff-add-highlight-text: #99FF99;
  --diff-ctx-bg: #1C1C1E;
  --diff-ctx-text: #636366;
  --diff-hunk-header: #252527;
}
[data-theme="light"] {
  --inspector-content: #86868B;
  --diff-del-bg: #FDE8E8;
  --diff-del-text: #8A3A3A;
  --diff-del-highlight: #E8A0A0;
  --diff-del-highlight-text: #8A1A1A;
  --diff-add-bg: #E8F8E8;
  --diff-add-text: #3A6A3A;
  --diff-add-highlight: #A0E8A0;
  --diff-add-highlight-text: #1A6A1A;
  --diff-ctx-bg: #F5F5F7;
  --diff-ctx-text: #86868B;
  --diff-hunk-header: #E8E8ED;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
#app { display: flex; height: 100vh; }
#sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); padding: 12px; overflow-y: auto; }
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#statusbar { height: 36px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 14px; font-size: 11px; color: var(--text-secondary); }
#thread { flex: 1; overflow-y: auto; padding: 16px 20px; }
.turn-group { margin-bottom: 6px; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }
.turn-group-header { background: var(--bg-surface); padding: 6px 10px; font-size: 11px; color: var(--text-secondary); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
.turn-group-body { padding: 0; }
.turn-group.collapsed .turn-group-body { display: none; }
.turn-group .msg-thinking { margin-bottom: 0; border-radius: 0; border-top: 1px solid var(--border-color); }
.turn-group .tool-row { margin-bottom: 0; border-radius: 0; }
#composer { min-height: 56px; margin: 8px 16px; background: var(--composer-bg); border: 1px solid var(--border-light); border-radius: 8px; display: flex; align-items: flex-start; padding: 12px 16px; }
#inspector { width: 360px; background: var(--bg-secondary); border-left: 1px solid var(--border-color); padding: 16px; overflow-y: auto; }
.msg { margin-bottom: 8px; }
.msg-user { color: var(--msg-user-color); margin-bottom: 6px; padding: 4px 0; }
.turn-group + .msg-assistant { margin-top: 2px; }
.msg-assistant + .turn-group { margin-top: 10px; }
.msg-thinking { background: var(--bg-surface); border-radius: 6px; padding: 8px 12px; color: var(--text-secondary); font-size: 12px; margin-bottom: 6px; }
.msg-assistant { background: var(--bg-surface); border-radius: 6px; padding: 10px 14px; font-size: 12px; line-height: 1.6; margin-bottom: 8px; }
.msg-notice { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; }
.msg-assistant p { margin: 0 0 8px; }
.msg-assistant p:last-child { margin-bottom: 0; }
.msg-assistant strong { font-weight: 700; color: var(--text-primary); }
.msg-assistant code { font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace; background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--accent-text); }
.msg-assistant pre { background: var(--code-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
.msg-assistant pre code { background: none; padding: 0; border-radius: 0; font-size: 11px; color: var(--text-secondary); border: none; }
.msg-assistant h2, .msg-assistant h3, .msg-assistant h4 { color: var(--text-primary); margin: 10px 0 4px; font-weight: 700; }
.msg-assistant h2 { font-size: 14px; }
.msg-assistant h3 { font-size: 13px; }
.msg-assistant h4 { font-size: 12px; }
.msg-assistant ul { margin: 4px 0; padding-left: 20px; }
.msg-assistant li { margin-bottom: 2px; }
.msg-assistant hr { border: none; border-top: 1px solid var(--border-color); margin: 8px 0; }
.tool-row { background: var(--bg-surface); border-radius: 6px; margin-bottom: 4px; font-size: 12px; cursor: pointer; overflow: hidden; }
.tool-row-header { display: flex; align-items: center; padding: 6px 10px; }
.tool-row-body { display: none; padding: 0 10px 8px; font-size: 11px; color: var(--text-secondary); border-top: 1px solid var(--border-color); margin-top: 0; padding-top: 6px; white-space: pre-wrap; word-break: break-all; }
.tool-row.open .tool-row-body { display: block; }
.tool-name { font-weight: bold; margin-left: 8px; }
.tool-ok { margin-left: auto; padding-left: 8px; }
.tool-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; }
#composer-input { flex: 1; background: none; border: none; color: var(--text-primary); font-size: 13px; outline: none; resize: none; font-family: inherit; line-height: 1.5; max-height: 200px; }
#composer-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
.status-item { margin-right: 16px; }
.brand { color: var(--accent); font-weight: bold; margin-right: 12px; }
#theme-toggle { background: none; border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-secondary); font-size: 10px; padding: 2px 6px; cursor: pointer; margin-left: auto; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div style="background:#2C2C2E;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:16px;cursor:pointer" onclick="newSession()">+ 新建会话</div>
    <div id="session-list" style="font-size:12px"></div>
  </div>
  <div id="main">
    <div id="statusbar">
      <span class="brand">● 球球</span>
      <span class="status-item" id="st-mode" style="cursor:pointer" title="点击切换 ask/plan">ask</span>
      <span id="st-planmode" style="display:none;color:var(--yellow-text);font-size:11px"> 🔒 只读</span>
      <span class="status-item" id="st-skill">全栈开发</span>
      <span class="status-item" id="st-session">—</span>
      <span class="status-item" id="st-tokens">↑0 ↓0</span>
      <span class="status-item" id="st-cache">● 0%</span>
      <span id="st-running" style="color:var(--green);display:none">● 运行中</span>
      <button id="tools-toggle" onclick="loadTools()" title="查看可用工具" style="background:none;border:1px solid var(--border-color);border-radius:4px;color:var(--text-secondary);font-size:10px;padding:2px 6px;cursor:pointer;margin-right:4px">🔧</button>
      <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
    <div id="thread"></div>
    <div id="confirm-bar" style="display:none;margin:0 16px 8px;background:#282420;border-radius:6px;padding:8px 12px;font-size:12px;flex-direction:column;gap:6px">
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <span style="color:#B8943C;font-weight:bold">⚠ 高危操作：</span>
        <span id="confirm-tool" style="color:#E5E5EA;font-weight:bold"></span>
        <span style="color:#8E8E93;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="confirm-desc"></span>
        <button onclick="confirmAction(true)" style="background:#2C5F3A;color:#A0E0A0;border:none;border-radius:4px;padding:4px 14px;font-size:12px;cursor:pointer;margin-left:auto">批准</button>
        <button onclick="confirmAction(false)" style="background:#3A3A3C;color:#8E8E93;border:none;border-radius:4px;padding:4px 14px;font-size:12px;cursor:pointer">拒绝</button>
      </div>
      <div id="confirm-steps" style="display:none;border-top:1px solid #3A3A3C;padding-top:6px;font-size:11px;color:#E5E5EA"></div>
    </div>
    <div id="composer">
      <textarea id="composer-input" placeholder="输入消息，或 /command..." autofocus rows="1"></textarea>
      <button id="composer-btn">发送</button>
    </div>
  </div>
  <div id="inspector">
    <div style="font-size:13px;font-weight:bold;margin-bottom:16px">执行详情</div>
    <div id="inspector-content" style="font-size:12px;color:#8E8E93">选择一个工具或消息查看详情</div>
  </div>
</div>
<script>
const thread = document.getElementById('thread');
const input = document.getElementById('composer-input');
const btn = document.getElementById('composer-btn');
const evtSource = new EventSource('/api/events');

function safeParseSSE(e) { try { return JSON.parse(e.data); } catch(ex) { return null; } }
function scrollToBottom() { thread.scrollTop = thread.scrollHeight; }

evtSource.addEventListener('user_message', e => {
  const d = safeParseSSE(e); if (!d) return;
  addMsg('user', '> ' + d.text);
});
evtSource.addEventListener('assistant_delta', e => {
  const d = safeParseSSE(e); if (!d) return;
  appendAssistant(d.text);
});
evtSource.addEventListener('reasoning_delta', e => {
  const d = safeParseSSE(e); if (!d) return;
  appendThinking(d.text);
});
evtSource.addEventListener('tool_call', e => {
  const d = safeParseSSE(e); if (!d) return;
  addToolRow(d.name, d.arguments, 'running', d.id);
});
evtSource.addEventListener('tool_result', e => {
  const d = safeParseSSE(e); if (!d) return;
  console.log('tool_result event:', d);
  updateToolRow(d.id, '✓', d.result || '');
  if (d.diff) {
    console.log('diff received:', JSON.stringify(d.diff));
    renderDiff(d.diff);
  } else {
    console.log('no diff in tool_result');
  }
});
evtSource.addEventListener('notice', e => {
  const d = safeParseSSE(e); if (!d) return;
  addMsg('notice', d.text);
});
evtSource.addEventListener('error', e => {
  console.warn('SSE error:', e);
});
evtSource.addEventListener('state', e => {
  const d = safeParseSSE(e); if (!d) return;
  document.getElementById('st-mode').textContent = d.mode;
  document.getElementById('st-mode').onclick = function() { toggleMode(d.mode); };
  // mode 切换锁复位（state 到达说明上次切换已完成）
  modeChanging = false;
  // plan_mode 只读标记
  const pm = document.getElementById('st-planmode');
  pm.style.display = d.plan_mode ? 'inline' : 'none';
  document.getElementById('st-skill').textContent = d.skill;
  document.getElementById('st-session').textContent = d.session_id;
  document.getElementById('st-tokens').textContent = '↑' + d.cache_hit + ' ↓' + d.cache_miss;
  if (d.cache_hit + d.cache_miss > 0) {
    const rate = (d.cache_hit / (d.cache_hit + d.cache_miss) * 100).toFixed(1);
    document.getElementById('st-cache').textContent = '● ' + rate + '%';
  }
  const running = document.getElementById('st-running');
  running.style.display = d.running ? 'inline' : 'none';
  if (d.running) {
    btn.textContent = '停止';
    btn.onclick = stopRun;
  } else {
    btn.textContent = '发送';
    btn.onclick = sendMsg;
  }
});
evtSource.addEventListener('done', () => {
  btn.textContent = '发送';
  btn.onclick = sendMsg;
  pendingConfirm = null;
  confirmBar.style.display = 'none';
  loadSessions(); // 刷新会话列表
});

// Confirm request — 高危操作确认（显示在输入框上方）
let pendingConfirm = null;
const confirmBar = document.getElementById('confirm-bar');
const confirmTool = document.getElementById('confirm-tool');
const confirmDesc = document.getElementById('confirm-desc');
const confirmSteps = document.getElementById('confirm-steps');
evtSource.addEventListener('confirm_request', e => {
  const d = safeParseSSE(e); if (!d) return;
  pendingConfirm = d;
  confirmTool.textContent = d.tool_name;
  confirmDesc.textContent = typeof d.arguments === 'string' ? d.arguments : JSON.stringify(d.arguments);
  // 如果有方案步骤，展示在确认栏中
  if (d.steps && d.steps.length > 0) {
    let stepsHtml = '<div style="font-weight:bold;margin-bottom:4px;color:#B8943C">📋 执行步骤：</div>';
    d.steps.forEach((s, i) => {
      stepsHtml += '<div style="padding:2px 0">' + (i+1) + '. ' + escapeHtml(s.desc || '') + '</div>';
    });
    confirmSteps.innerHTML = stepsHtml;
    confirmSteps.style.display = 'block';
  } else {
    confirmSteps.style.display = 'none';
  }
  confirmBar.style.display = 'flex';
});
// Plan 方案展示
evtSource.addEventListener('plan_proposal', e => {
  const d = safeParseSSE(e); if (!d) return;
  const plan = d.plan || {};
  const steps = plan.steps || [];
  // 在右侧面板展示详细方案
  let html = '<div style="font-size:13px;font-weight:bold;color:var(--text-primary);margin-bottom:8px">📋 方案</div>';
  html += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px">目标: ' + escapeHtml(plan.goal || '') + '</div>';
  steps.forEach((s, i) => {
    html += '<div style="background:var(--bg-surface);padding:6px 10px;border-radius:4px;margin-bottom:4px;font-size:12px;color:var(--text-primary)">' +
      (i+1) + '. ' + escapeHtml(s.desc || s.Desc || '') + '</div>';
  });
  if (d.research) {
    html += '<div style="margin-top:8px;font-size:11px;color:var(--text-secondary);white-space:pre-wrap">' + escapeHtml(d.research) + '</div>';
  }
  document.getElementById('inspector-content').innerHTML = html;
  // 同时在 thread 中展示方案摘要，让用户一眼看到
  let threadHtml = '<div style="font-weight:bold;color:var(--text-primary);margin-bottom:4px">📋 方案已生成，请审批</div>';
  threadHtml += '<div style="color:var(--text-secondary);margin-bottom:4px">目标：' + escapeHtml(plan.goal || '') + '</div>';
  steps.forEach((s, i) => {
    threadHtml += '<div style="padding:2px 0;color:var(--text-primary)">' + (i+1) + '. ' + escapeHtml(s.desc || s.Desc || '') + '</div>';
  });
  const planDiv = document.createElement('div');
  planDiv.className = 'msg msg-notice';
  planDiv.innerHTML = threadHtml;
  thread.appendChild(planDiv);
  scrollToBottom();
});
function confirmAction(approve) {
  pendingConfirm = null;
  confirmBar.style.display = 'none';
  confirmSteps.style.display = 'none';
  document.getElementById('inspector-content').textContent = approve ? '✅ 已批准' : '❌ 已拒绝';
  fetch('/api/confirm', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({approve}) });
}

// 主题切换
(function initTheme() {
  const saved = localStorage.getItem('qiuqiu-theme');
  const theme = saved || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
})();
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('qiuqiu-theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
}

// 会话列表
function loadSessions() {
  fetch('/api/sessions').then(r => r.json()).then(sessions => {
    const el = document.getElementById('session-list');
    let html = '';
    const currentId = document.getElementById('st-session').textContent;
    // 运行中
    const running = sessions.filter(s => s.running);
    if (running.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">运行中</div>';
      running.forEach(s => { html += sessionRow(s, currentId); });
    }
    // 今天
    const today = new Date(); today.setHours(0,0,0,0);
    const todaySec = Math.floor(today.getTime()/1000);
    const todays = sessions.filter(s => !s.running && s.time >= todaySec);
    if (todays.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">今天</div>';
      todays.forEach(s => { html += sessionRow(s, currentId); });
    }
    // 昨天
    const yesterdaySec = todaySec - 86400;
    const yesterdays = sessions.filter(s => !s.running && s.time >= yesterdaySec && s.time < todaySec);
    if (yesterdays.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">昨天</div>';
      yesterdays.forEach(s => { html += sessionRow(s, currentId); });
    }
    // 更早
    const older = sessions.filter(s => !s.running && s.time < yesterdaySec);
    if (older.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">更早</div>';
      older.forEach(s => { html += sessionRow(s, currentId); });
    }
    el.innerHTML = html || '<div style="color:#636366;margin-top:8px">暂无会话</div>';
  });
}
function sessionRow(s, currentID) {
  const isCurrent = s.id === currentID;
  const color = s.running ? '#34C759' : (isCurrent ? '#3B82F6' : '#E5E5EA');
  const dot = s.running ? '<span style="color:#34C759;margin-right:6px">●</span>' : (isCurrent ? '<span style="color:#3B82F6;margin-right:6px">▎</span>' : '');
  const cursor = isCurrent ? 'default' : 'pointer';
  return '<div style="padding:6px 0;color:'+color+';cursor:'+cursor+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis"' +
    (isCurrent ? '' : ' onclick="switchSession(\''+s.id+'\')"') + '>' + dot + s.title + '</div>';
}
function switchSession(id) {
  fetch('/api/sessions/switch', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:id})})
    .then(() => location.reload());
}
function newSession() {
  fetch('/api/sessions/new', {method:'POST'}).then(() => location.reload());
}
// 页面加载时获取会话历史
fetch('/api/history').then(r => r.json()).then(msgs => {
  msgs.forEach(m => {
    if (m.role === 'user') {
      addMsg('user', '> ' + m.content);
    } else if (m.role === 'assistant') {
      // 先渲染 reasoning/thinking 内容（如果有）
      if (m.reasoning_content) {
        appendThinking(m.reasoning_content);
        // 标记为已完成的思考过程，保持内容可见
        const turnGroup = ensureTurnGroup();
        const lastThinking = turnGroup.querySelector('.msg-thinking:last-child');
        if (lastThinking) {
          const header = lastThinking.querySelector('.thinking-header');
          if (header) header.textContent = '▼ 思考过程';
          lastThinking.dataset.folded = 'open';
        }
      }
      // 再渲染工具调用（如果有）
      if (m.tool_calls && m.tool_calls.length > 0) {
        m.tool_calls.forEach(tc => {
          addToolRow(tc.name, tc.arguments, '✓', tc.id);
        });
        // 历史加载时默认折叠执行过程组
        if (currentTurnGroup) currentTurnGroup.classList.add('collapsed');
      }
      // 最后渲染文本内容
      if (m.content) addMsg('assistant', m.content);
    } else if (m.role === 'tool') {
      updateToolRow(m.tool_call_id || '', '✓', m.content || '');
    }
  });
});

// 页面加载和每次 done 后刷新会话列表
loadSessions();


function renderMarkdown(text) {
  if (!text) return '';
  // Escape HTML special chars first
  let html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks (``` ... ```) — with syntax highlighting
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    const unescaped = code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    const highlighted = highlightCode(unescaped, lang);
    const langLabel = lang ? '<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase">' + lang + '</div>' : '';
    return '<pre style="position:relative">' + langLabel + '<code class="lang-'+lang+'">' + highlighted + '</code></pre>';
  });
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  // Unordered lists
  html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');
  // Line breaks (double newline = paragraph, single newline = br)
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  // Cleanup empty paragraphs
  html = html.replace(/<p><\/p>/g, '');
  return html;
}

let lastAssistant = null;
let currentTurnGroup = null;

function ensureTurnGroup() {
  if (!currentTurnGroup || !document.body.contains(currentTurnGroup)) {
    const group = document.createElement('div');
    group.className = 'turn-group';
    group.innerHTML = '<div class="turn-group-header" onclick="toggleTurnGroup(this.parentElement)">▶ 执行过程</div><div class="turn-group-body"></div>';
    thread.appendChild(group);
    currentTurnGroup = group;
  }
  return currentTurnGroup;
}
function toggleTurnGroup(el) {
  el.classList.toggle('collapsed');
  const h = el.querySelector('.turn-group-header');
  h.textContent = el.classList.contains('collapsed') ? '▶ 执行过程' : '▼ 执行过程';
}

function addMsg(type, text) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  if (type === 'assistant') {
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  thread.appendChild(div);
  scrollToBottom();
  // notice 不打断当前 turn-group（如 Plan 模式的进度提示），只有新轮次才重置
  if (type !== 'notice') {
    lastAssistant = null;
    currentTurnGroup = null;
  }
}
function appendAssistant(text) {
  if (!lastAssistant) {
    const div = document.createElement('div');
    div.className = 'msg msg-assistant';
    thread.appendChild(div);
    lastAssistant = div;
  }
  lastAssistant.dataset.raw = (lastAssistant.dataset.raw || '') + text;
  lastAssistant.innerHTML = renderMarkdown(lastAssistant.dataset.raw);
  scrollToBottom();
}
function appendThinking(text) {
  const turnGroup = ensureTurnGroup();
  const body = turnGroup.querySelector('.turn-group-body');
  let t = body.querySelector('.msg-thinking:last-child');
  if (!t || t.dataset.folded === 'closed') {
    t = document.createElement('div');
    t.className = 'msg msg-thinking';
    t.dataset.folded = 'open';
    t.innerHTML = '<div class="thinking-header" style="cursor:pointer;user-select:none" onclick="toggleThinking(this.parentElement);event.stopPropagation()">▶ 思考中…</div><div class="thinking-body" style="display:none;margin-top:4px"></div>';
    body.appendChild(t);
  }
  const tb = t.querySelector('.thinking-body');
  if (tb) tb.textContent += text;
  scrollToBottom();
}
function toggleThinking(el) {
  const body = el.querySelector('.thinking-body');
  const header = el.querySelector('.thinking-header');
  if (!body || !header) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  header.textContent = isOpen ? '▶ 思考中…' : '▼ 思考过程';
  el.dataset.folded = isOpen ? 'closed' : 'open';
}
function addToolRow(name, args, status, id) {
  const div = document.createElement('div');
  div.className = 'tool-row';
  div.dataset.tool = name;
  div.dataset.callId = id || '';
  const iconColor = status === '✓' ? '#1C6B3E' : '#2C5282';
  const statusIcon = status === '✓' ? '✓' : '⋯';
  div.innerHTML =
    '<div class="tool-row-header" onclick="toggleTool(this.parentElement)">' +
    '<div class="tool-icon" style="background:' + iconColor + '"></div>' +
    '<span class="tool-name">' + name + '</span>' +
    '<span class="tool-ok">' + statusIcon + '</span></div>' +
    '<div class="tool-row-body">' + (typeof args === 'string' ? args : JSON.stringify(args, null, 2)) + '</div>';
  // 始终放入 turn-group（没有则创建），保证工具调用有折叠组包裹
  const turnGroup = ensureTurnGroup();
  turnGroup.querySelector('.turn-group-body').appendChild(div);
  scrollToBottom();
}
function updateToolRow(id, status, result) {
  let row;
  if (id) {
    row = thread.querySelector('.tool-row[data-call-id="' + id + '"]');
  } else {
    // 向后兼容：没有 ID 时按工具名匹配最后一行
    const rows = thread.querySelectorAll('.tool-row');
    row = rows[rows.length - 1];
  }
  if (!row) return;
  row.querySelector('.tool-ok').textContent = status === '✓' ? '✓' : '✗';
  if (status === '✓') row.querySelector('.tool-icon').style.background = '#1C6B3E';
  if (result) {
    const body = row.querySelector('.tool-row-body');
    if (body) body.textContent = result;
  }
}
function toggleTool(el) {
  el.classList.toggle('open');
  // 在 Inspector 中展示工具详情
  const name = el.querySelector('.tool-name')?.textContent || '';
  const status = el.querySelector('.tool-ok')?.textContent || '';
  const body = el.querySelector('.tool-row-body');
  const args = body ? body.textContent : '';
  const insp = document.getElementById('inspector-content');
  let html = '<div style="font-size:13px;font-weight:bold;margin-bottom:8px;color:var(--text-primary)">🔧 ' + name + '</div>';
  html += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">状态: ' + status + '</div>';
  if (args) {
    html += '<div style="font-size:11px;font-weight:bold;color:var(--text-muted);margin-bottom:4px">参数/结果</div>';
    html += '<div style="background:var(--code-bg);padding:8px;border-radius:4px;font-size:11px;color:var(--text-secondary);white-space:pre-wrap;word-break:break-all">' + escapeHtml(args) + '</div>';
  }
  insp.innerHTML = html;
}

// 字级 diff：对比两段文本，返回 {delHtml, addHtml} 各自的行内高亮
function wordDiff(oldText, newText) {
  if (!oldText && !newText) return {delHtml:'', addHtml:''};
  const a = oldText.split(''), b = newText.split('');
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  let i = m, j = n, ops = [];
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) { ops.push({t:'s',ch:a[i-1]}); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { ops.push({t:'a',ch:b[j-1]}); j--; }
    else if (i > 0) { ops.push({t:'d',ch:a[i-1]}); i--; }
  }
  ops.reverse();
  let delBuf='', addBuf='', delHtml='', addHtml='';
  function flush() {
    if (delBuf) { delHtml += '<span style="background:var(--diff-del-highlight);color:var(--diff-del-highlight-text);text-decoration:line-through">'+escapeHtml(delBuf)+'</span>'; delBuf=''; }
    if (addBuf) { addHtml += '<span style="background:var(--diff-add-highlight);color:var(--diff-add-highlight-text)">'+escapeHtml(addBuf)+'</span>'; addBuf=''; }
  }
  for (const op of ops) {
    if (op.t === 's') { flush(); delHtml += escapeHtml(op.ch); addHtml += escapeHtml(op.ch); }
    else if (op.t === 'd') delBuf += op.ch;
    else if (op.t === 'a') addBuf += op.ch;
  }
  flush();
  return {delHtml, addHtml};
}

// 渲染 diff 到 Inspector 面板（行级 + 字级）
function renderDiff(diff) {
  const insp = document.getElementById('inspector-content');
  let html = '<div style="font-size:13px;font-weight:bold;margin-bottom:8px;color:#E5E5EA">Diff</div>';
  html += '<div style="font-size:11px;color:#3B82F6;margin-bottom:8px">' + escapeHtml(diff.path) + '</div>';
  (diff.hunks || []).forEach(h => {
    html += '<div style="background:var(--diff-ctx-bg);border-radius:4px;margin-bottom:6px;overflow:hidden">';
    html += '<div style="background:var(--diff-hunk-header);padding:4px 8px;font-size:10px;color:var(--text-muted)">@@ -' + h.old_start + ' +' + h.new_start + ' @@</div>';
    for (let li = 0; li < (h.lines || []).length; li++) {
      const l = h.lines[li], next = h.lines[li+1];
      if (l.op === 'del' && next && next.op === 'add') {
        const wd = wordDiff(l.text, next.text);
        html += '<div style="background:var(--diff-del-bg);padding:2px 8px;font-size:11px;color:var(--diff-del-text)">− ' + wd.delHtml + '</div>';
        html += '<div style="background:var(--diff-add-bg);padding:2px 8px;font-size:11px;color:var(--diff-add-text)">+ ' + wd.addHtml + '</div>';
        li++;
      } else if (l.op === 'add') {
        html += '<div style="background:var(--diff-add-bg);padding:2px 8px;font-size:11px;color:var(--diff-add-text)">+ ' + escapeHtml(l.text) + '</div>';
      } else if (l.op === 'del') {
        html += '<div style="background:var(--diff-del-bg);padding:2px 8px;font-size:11px;color:var(--diff-del-text);text-decoration:line-through">− ' + escapeHtml(l.text) + '</div>';
      } else {
        html += '<div style="padding:2px 8px;font-size:11px;color:var(--diff-ctx-text)">  ' + escapeHtml(l.text) + '</div>';
      }
    }
    html += '</div>';
  });
  insp.innerHTML = html;
}
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 轻量语法高亮：对常见语言的关键字/字符串/注释着色
function highlightCode(code, lang) {
  const keywords = {
    go: /\b(func|if|else|for|range|return|var|const|type|struct|interface|map|chan|go|defer|select|case|switch|break|continue|package|import|nil|true|false|len|cap|make|new|append|error|string|int|bool|byte|float64|uintptr)\b/g,
    js: /\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|this|typeof|instanceof|class|import|export|default|from|async|await|try|catch|finally|throw|true|false|null|undefined)\b/g,
    json: /"([^"]+)":/g,
    py: /\b(def|class|if|elif|else|for|while|return|import|from|as|try|except|finally|with|yield|lambda|pass|break|continue|True|False|None|self|async|await|in|not|and|or|is|raise)\b/g,
    sh: /\b(if|then|else|fi|for|do|done|while|case|esac|function|return|exit|export|local|echo|cd|mkdir|rm|cp|mv|cat|grep|sed|awk|find|chmod|source)\b/g,
  };
  const re = keywords[lang] || null;
  // 先转义 HTML
  let html = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 字符串高亮（单引号/双引号/反引号）
  html = html.replace(/(["'`])(?:(?!\1|\\).|\\.)*\1/g, '<span style="color:#6A9955">$&</span>');
  // 注释高亮
  html = html.replace(/(\/\/.*$)/gm, '<span style="color:#6A9955;font-style:italic">$1</span>');
  html = html.replace(/(\/\*[\s\S]*?\*\/)/g, '<span style="color:#6A9955;font-style:italic">$1</span>');
  // 关键字高亮
  if (re) {
    html = html.replace(re, '<span style="color:#569CD6;font-weight:600">$1</span>');
  }
  // 数字高亮
  html = html.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#B5CEA8">$1</span>');
  return html;
}

// mode 切换防抖锁，防止快速点击导致状态不同步
let modeChanging = false;
let modeChangeTimeout = null;

function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text}) });
}
function stopRun() {
  btn.textContent = '停止中…';
  btn.onclick = null;
  fetch('/api/interrupt', { method: 'POST' });
}
function loadTools() {
  fetch('/api/tools').then(r => r.json()).then(tools => {
    const insp = document.getElementById('inspector-content');
    let html = '<div style="font-size:13px;font-weight:bold;color:var(--text-primary);margin-bottom:8px">🔧 可用工具 (' + tools.length + ')</div>';
    tools.forEach(t => {
      const badge = t.read_only ? '<span style="color:var(--green-text);font-size:10px">[只读]</span>' : '<span style="color:var(--yellow-text);font-size:10px">[写]</span>';
      html += '<div style="background:var(--bg-surface);padding:6px 10px;border-radius:4px;margin-bottom:4px;font-size:12px">' +
        '<div style="color:var(--text-primary);font-weight:bold">' + badge + ' ' + escapeHtml(t.name) + '</div>' +
        '<div style="color:var(--text-secondary);font-size:11px;margin-top:2px">' + escapeHtml(t.description) + '</div></div>';
    });
    insp.innerHTML = html;
  }).catch(() => {
    document.getElementById('inspector-content').textContent = '❌ 加载工具列表失败';
  });
}
function toggleMode(current) {
  if (modeChanging) return;
  modeChanging = true;
  const target = current === 'ask' ? '/mode plan' : '/mode ask';
  fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text: target}) });
  // 兜底解锁：2 秒后自动释放，防止 state 事件丢失导致锁死
  clearTimeout(modeChangeTimeout);
  modeChangeTimeout = setTimeout(() => { modeChanging = false; }, 2000);
}
btn.onclick = sendMsg;
const autoResize = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
};
input.addEventListener('input', autoResize);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
