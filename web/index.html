<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球球 - QiuQiuPro</title>
<style>
:root {
  /* Dark theme (default) */
  --bg-primary: #1C1C1E;
  --bg-secondary: #151517;
  --bg-surface: #252527;
  --bg-elevated: #2C2C2E;
  --text-primary: #E5E5EA;
  --text-secondary: #8E8E93;
  --text-muted: #636366;
  --border-color: #2C2C2E;
  --border-light: #3A3A3C;
  --accent: #3B82F6;
  --accent-text: #3B82F6;
  --green: #34C759;
  --green-bg: #1A3D1A;
  --green-text: #50C878;
  --red-bg: #3D1A1A;
  --red-text: #FF6B6B;
  --yellow-bg: #282420;
  --yellow-text: #B8943C;
  --code-bg: #1C1C1E;
  --msg-user-color: #E5E5EA;
  --composer-bg: #252527;
  --inspector-content: #8E8E93;
}
[data-theme="light"] {
  --bg-primary: #F5F5F7;
  --bg-secondary: #FFFFFF;
  --bg-surface: #FFFFFF;
  --bg-elevated: #E8E8ED;
  --text-primary: #1D1D1F;
  --text-secondary: #86868B;
  --text-muted: #B0B0B5;
  --border-color: #D2D2D7;
  --border-light: #D2D2D7;
  --accent: #0071E3;
  --accent-text: #0071E3;
  --green: #34C759;
  --green-bg: #E8F8E8;
  --green-text: #1A8C1A;
  --red-bg: #FDE8E8;
  --red-text: #C41E1E;
  --yellow-bg: #FEF7E0;
  --yellow-text: #9A7B1E;
  --code-bg: #F5F5F7;
  --msg-user-color: #1D1D1F;
  --composer-bg: #FFFFFF;
  --inspector-content: #86868B;
  --diff-del-bg: #2D1515;
  --diff-del-text: #8A5A5A;
  --diff-del-highlight: #6B2020;
  --diff-del-highlight-text: #FF9999;
  --diff-add-bg: #152D15;
  --diff-add-text: #5A8A5A;
  --diff-add-highlight: #206B20;
  --diff-add-highlight-text: #99FF99;
  --diff-ctx-bg: #1C1C1E;
  --diff-ctx-text: #636366;
  --diff-hunk-header: #252527;
}
[data-theme="light"] {
  --inspector-content: #86868B;
  --diff-del-bg: #FDE8E8;
  --diff-del-text: #8A3A3A;
  --diff-del-highlight: #E8A0A0;
  --diff-del-highlight-text: #8A1A1A;
  --diff-add-bg: #E8F8E8;
  --diff-add-text: #3A6A3A;
  --diff-add-highlight: #A0E8A0;
  --diff-add-highlight-text: #1A6A1A;
  --diff-ctx-bg: #F5F5F7;
  --diff-ctx-text: #86868B;
  --diff-hunk-header: #E8E8ED;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
#app { display: flex; height: 100vh; }
#sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); padding: 12px; overflow-y: auto; }
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#statusbar { height: 36px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 14px; font-size: 11px; color: var(--text-secondary); }
#thread { flex: 1; overflow-y: auto; padding: 16px 20px; }
#composer { height: 56px; margin: 8px 16px; background: var(--composer-bg); border: 1px solid var(--border-light); border-radius: 8px; display: flex; align-items: center; padding: 0 16px; }
#inspector { width: 360px; background: var(--bg-secondary); border-left: 1px solid var(--border-color); padding: 16px; overflow-y: auto; }
.msg { margin-bottom: 8px; }
.msg-user { color: var(--msg-user-color); margin-bottom: 6px; }
.msg-thinking { background: var(--bg-surface); border-radius: 6px; padding: 8px 12px; color: var(--text-secondary); font-size: 12px; margin-bottom: 6px; }
.msg-assistant { background: var(--bg-surface); border-radius: 6px; padding: 10px 14px; font-size: 12px; line-height: 1.6; margin-bottom: 8px; }
.tool-row { background: var(--bg-surface); border-radius: 6px; margin-bottom: 4px; font-size: 12px; cursor: pointer; overflow: hidden; }
.tool-row-header { display: flex; align-items: center; padding: 6px 10px; }
.tool-row-body { display: none; padding: 0 10px 8px; font-size: 11px; color: var(--text-secondary); border-top: 1px solid var(--border-color); margin-top: 0; padding-top: 6px; white-space: pre-wrap; word-break: break-all; }
.tool-row.open .tool-row-body { display: block; }
.tool-name { font-weight: bold; margin-left: 8px; }
.tool-ok { margin-left: auto; padding-left: 8px; }
.tool-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; }
#composer-input { flex: 1; background: none; border: none; color: var(--text-primary); font-size: 13px; outline: none; }
#composer-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
.status-item { margin-right: 16px; }
.brand { color: var(--accent); font-weight: bold; margin-right: 12px; }
#theme-toggle { background: none; border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-secondary); font-size: 10px; padding: 2px 6px; cursor: pointer; margin-left: auto; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div style="background:#2C2C2E;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:16px;cursor:pointer" onclick="newSession()">+ 新建会话</div>
    <div id="session-list" style="font-size:12px"></div>
  </div>
  <div id="main">
    <div id="statusbar">
      <span class="brand">● 球球</span>
      <span class="status-item" id="st-mode" style="cursor:pointer" title="点击切换 ask/plan">ask</span>
      <span class="status-item" id="st-skill">全栈开发</span>
      <span class="status-item" id="st-session">—</span>
      <span class="status-item" id="st-tokens">↑0 ↓0</span>
      <span class="status-item" id="st-cache">● 0%</span>
      <span id="st-running" style="color:var(--green);display:none">● 运行中</span>
      <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
    <div id="thread"></div>
    <div id="confirm-bar" style="display:none;margin:0 16px 8px;background:#282420;border-radius:6px;padding:8px 12px;font-size:12px;align-items:center;gap:8px">
      <span style="color:#B8943C;font-weight:bold">⚠ 高危操作：</span>
      <span id="confirm-tool" style="color:#E5E5EA;font-weight:bold"></span>
      <span style="color:#8E8E93;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="confirm-desc"></span>
      <button onclick="confirmAction(true)" style="background:#2C5F3A;color:#A0E0A0;border:none;border-radius:4px;padding:4px 14px;font-size:12px;cursor:pointer">批准</button>
      <button onclick="confirmAction(false)" style="background:#3A3A3C;color:#8E8E93;border:none;border-radius:4px;padding:4px 14px;font-size:12px;cursor:pointer">拒绝</button>
    </div>
    <div id="composer">
      <input id="composer-input" type="text" placeholder="输入消息，或 /command..." autofocus>
      <button id="composer-btn">发送</button>
    </div>
  </div>
  <div id="inspector">
    <div style="font-size:13px;font-weight:bold;margin-bottom:16px">执行详情</div>
    <div id="inspector-content" style="font-size:12px;color:#8E8E93">选择一个工具或消息查看详情</div>
  </div>
</div>
<script>
const thread = document.getElementById('thread');
const input = document.getElementById('composer-input');
const btn = document.getElementById('composer-btn');
const evtSource = new EventSource('/api/events');

function safeParseSSE(e) { try { return JSON.parse(e.data); } catch(ex) { return null; } }

evtSource.addEventListener('user_message', e => {
  const d = safeParseSSE(e); if (!d) return;
  addMsg('user', '> ' + d.text);
});
evtSource.addEventListener('assistant_delta', e => {
  const d = safeParseSSE(e); if (!d) return;
  appendAssistant(d.text);
});
evtSource.addEventListener('reasoning_delta', e => {
  const d = safeParseSSE(e); if (!d) return;
  appendThinking(d.text);
});
evtSource.addEventListener('tool_call', e => {
  const d = safeParseSSE(e); if (!d) return;
  addToolRow(d.name, d.arguments, 'running', d.id);
});
evtSource.addEventListener('tool_result', e => {
  const d = safeParseSSE(e); if (!d) return;
  console.log('tool_result event:', d);
  updateToolRow(d.id, '✓', d.result || '');
  if (d.diff) {
    console.log('diff received:', JSON.stringify(d.diff));
    renderDiff(d.diff);
  } else {
    console.log('no diff in tool_result');
  }
});
evtSource.addEventListener('notice', e => {
  const d = safeParseSSE(e); if (!d) return;
  addMsg('notice', d.text);
});
evtSource.addEventListener('error', e => {
  console.warn('SSE error:', e);
});
evtSource.addEventListener('state', e => {
  const d = safeParseSSE(e); if (!d) return;
  document.getElementById('st-mode').textContent = d.mode;
  document.getElementById('st-mode').onclick = function() { toggleMode(d.mode); };
  document.getElementById('st-skill').textContent = d.skill;
  document.getElementById('st-session').textContent = d.session_id;
  document.getElementById('st-tokens').textContent = '↑' + d.cache_hit + ' ↓' + d.cache_miss;
  if (d.cache_hit + d.cache_miss > 0) {
    const rate = (d.cache_hit / (d.cache_hit + d.cache_miss) * 100).toFixed(1);
    document.getElementById('st-cache').textContent = '● ' + rate + '%';
  }
  const running = document.getElementById('st-running');
  running.style.display = d.running ? 'inline' : 'none';
  if (d.running) {
    btn.textContent = '停止';
    btn.onclick = stopRun;
  } else {
    btn.textContent = '发送';
    btn.onclick = sendMsg;
  }
});
evtSource.addEventListener('done', () => {
  btn.textContent = '发送';
  btn.onclick = sendMsg;
  pendingConfirm = null;
  confirmBar.style.display = 'none';
  loadSessions(); // 刷新会话列表
});

// Confirm request — 高危操作确认（显示在输入框上方）
let pendingConfirm = null;
const confirmBar = document.getElementById('confirm-bar');
const confirmTool = document.getElementById('confirm-tool');
const confirmDesc = document.getElementById('confirm-desc');
evtSource.addEventListener('confirm_request', e => {
  const d = safeParseSSE(e); if (!d) return;
  pendingConfirm = d;
  confirmTool.textContent = d.tool_name;
  confirmDesc.textContent = typeof d.arguments === 'string' ? d.arguments : JSON.stringify(d.arguments);
  confirmBar.style.display = 'flex';
  // Inspector 也提示，但不放按钮
  document.getElementById('inspector-content').innerHTML =
    '<div style="color:#B8943C">⚠ 高危操作等待确认，请在输入框上方审批</div>';
});
function confirmAction(approve) {
  pendingConfirm = null;
  confirmBar.style.display = 'none';
  document.getElementById('inspector-content').textContent = approve ? '✅ 已批准' : '❌ 已拒绝';
  fetch('/api/confirm', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({approve}) });
}

// 主题切换
(function initTheme() {
  const saved = localStorage.getItem('qiuqiu-theme');
  const theme = saved || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
})();
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('qiuqiu-theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
}

// 会话列表
function loadSessions() {
  fetch('/api/sessions').then(r => r.json()).then(sessions => {
    const el = document.getElementById('session-list');
    let html = '';
    const currentId = document.getElementById('st-session').textContent;
    // 运行中
    const running = sessions.filter(s => s.running);
    if (running.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">运行中</div>';
      running.forEach(s => { html += sessionRow(s, currentId); });
    }
    // 今天
    const today = new Date(); today.setHours(0,0,0,0);
    const todaySec = Math.floor(today.getTime()/1000);
    const todays = sessions.filter(s => !s.running && s.time >= todaySec);
    if (todays.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">今天</div>';
      todays.forEach(s => { html += sessionRow(s, currentId); });
    }
    // 昨天
    const yesterdaySec = todaySec - 86400;
    const yesterdays = sessions.filter(s => !s.running && s.time >= yesterdaySec && s.time < todaySec);
    if (yesterdays.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">昨天</div>';
      yesterdays.forEach(s => { html += sessionRow(s, currentId); });
    }
    // 更早
    const older = sessions.filter(s => !s.running && s.time < yesterdaySec);
    if (older.length) {
      html += '<div style="font-size:10px;color:#636366;font-weight:bold;margin-bottom:6px;margin-top:8px">更早</div>';
      older.forEach(s => { html += sessionRow(s, currentId); });
    }
    el.innerHTML = html || '<div style="color:#636366;margin-top:8px">暂无会话</div>';
  });
}
function sessionRow(s, currentID) {
  const isCurrent = s.id === currentID;
  const color = s.running ? '#34C759' : (isCurrent ? '#3B82F6' : '#E5E5EA');
  const dot = s.running ? '<span style="color:#34C759;margin-right:6px">●</span>' : (isCurrent ? '<span style="color:#3B82F6;margin-right:6px">▎</span>' : '');
  const cursor = isCurrent ? 'default' : 'pointer';
  return '<div style="padding:6px 0;color:'+color+';cursor:'+cursor+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis"' +
    (isCurrent ? '' : ' onclick="switchSession(\''+s.id+'\')"') + '>' + dot + s.title + '</div>';
}
function switchSession(id) {
  fetch('/api/sessions/switch', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:id})})
    .then(() => location.reload());
}
function newSession() {
  fetch('/api/sessions/new', {method:'POST'}).then(() => location.reload());
}
// 页面加载时获取会话历史
fetch('/api/history').then(r => r.json()).then(msgs => {
  msgs.forEach(m => {
    if (m.role === 'user') {
      addMsg('user', '> ' + m.content);
    } else if (m.role === 'assistant') {
      if (m.content) addMsg('assistant', m.content);
    } else if (m.role === 'tool') {
      const name = m.tool || m.name || '';
      addToolRow(name, m.content || '', '✓', '');
    }
  });
});

// 页面加载和每次 done 后刷新会话列表
loadSessions();


let lastAssistant = null;
function addMsg(type, text) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  lastAssistant = null;
}
function appendAssistant(text) {
  if (!lastAssistant) {
    const div = document.createElement('div');
    div.className = 'msg msg-assistant';
    thread.appendChild(div);
    lastAssistant = div;
  }
  lastAssistant.textContent += text;
  thread.scrollTop = thread.scrollHeight;
}
function appendThinking(text) {
  // Thinking block - append to the last one if it's still open
  let t = thread.querySelector('.msg-thinking:last-child');
  if (!t || t.dataset.folded !== 'open') {
    t = document.createElement('div');
    t.className = 'msg msg-thinking';
    t.dataset.folded = 'open';
    t.textContent = '▶ ';
    thread.appendChild(t);
  }
  t.textContent += text;
  thread.scrollTop = thread.scrollHeight;
}
function addToolRow(name, args, status, id) {
  const div = document.createElement('div');
  div.className = 'tool-row';
  div.dataset.tool = name;
  div.dataset.callId = id || '';
  const iconColor = status === '✓' ? '#1C6B3E' : '#2C5282';
  const statusIcon = status === '✓' ? '✓' : '⋯';
  div.innerHTML =
    '<div class="tool-row-header" onclick="toggleTool(this.parentElement)">' +
    '<div class="tool-icon" style="background:' + iconColor + '"></div>' +
    '<span class="tool-name">' + name + '</span>' +
    '<span class="tool-ok">' + statusIcon + '</span></div>' +
    '<div class="tool-row-body">' + (typeof args === 'string' ? args : JSON.stringify(args, null, 2)) + '</div>';
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}
function updateToolRow(id, status, result) {
  let row;
  if (id) {
    row = thread.querySelector('.tool-row[data-call-id="' + id + '"]');
  } else {
    // 向后兼容：没有 ID 时按工具名匹配最后一行
    const rows = thread.querySelectorAll('.tool-row');
    row = rows[rows.length - 1];
  }
  if (!row) return;
  row.querySelector('.tool-ok').textContent = status === '✓' ? '✓' : '✗';
  if (status === '✓') row.querySelector('.tool-icon').style.background = '#1C6B3E';
  if (result) {
    const body = row.querySelector('.tool-row-body');
    if (body) body.textContent = result;
  }
}
function toggleTool(el) {
  el.classList.toggle('open');
  // 在 Inspector 中展示工具详情
  const name = el.querySelector('.tool-name')?.textContent || '';
  const status = el.querySelector('.tool-ok')?.textContent || '';
  const body = el.querySelector('.tool-row-body');
  const args = body ? body.textContent : '';
  const insp = document.getElementById('inspector-content');
  let html = '<div style="font-size:13px;font-weight:bold;margin-bottom:8px;color:var(--text-primary)">🔧 ' + name + '</div>';
  html += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">状态: ' + status + '</div>';
  if (args) {
    html += '<div style="font-size:11px;font-weight:bold;color:var(--text-muted);margin-bottom:4px">参数/结果</div>';
    html += '<div style="background:var(--code-bg);padding:8px;border-radius:4px;font-size:11px;color:var(--text-secondary);white-space:pre-wrap;word-break:break-all">' + escapeHtml(args) + '</div>';
  }
  insp.innerHTML = html;
}

// 字级 diff：对比两段文本，返回 {delHtml, addHtml} 各自的行内高亮
function wordDiff(oldText, newText) {
  if (!oldText && !newText) return {delHtml:'', addHtml:''};
  const a = oldText.split(''), b = newText.split('');
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  let i = m, j = n, ops = [];
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) { ops.push({t:'s',ch:a[i-1]}); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { ops.push({t:'a',ch:b[j-1]}); j--; }
    else if (i > 0) { ops.push({t:'d',ch:a[i-1]}); i--; }
  }
  ops.reverse();
  let delBuf='', addBuf='', delHtml='', addHtml='';
  function flush() {
    if (delBuf) { delHtml += '<span style="background:var(--diff-del-highlight);color:var(--diff-del-highlight-text);text-decoration:line-through">'+escapeHtml(delBuf)+'</span>'; delBuf=''; }
    if (addBuf) { addHtml += '<span style="background:var(--diff-add-highlight);color:var(--diff-add-highlight-text)">'+escapeHtml(addBuf)+'</span>'; addBuf=''; }
  }
  for (const op of ops) {
    if (op.t === 's') { flush(); delHtml += escapeHtml(op.ch); addHtml += escapeHtml(op.ch); }
    else if (op.t === 'd') delBuf += op.ch;
    else if (op.t === 'a') addBuf += op.ch;
  }
  flush();
  return {delHtml, addHtml};
}

// 渲染 diff 到 Inspector 面板（行级 + 字级）
function renderDiff(diff) {
  const insp = document.getElementById('inspector-content');
  let html = '<div style="font-size:13px;font-weight:bold;margin-bottom:8px;color:#E5E5EA">Diff</div>';
  html += '<div style="font-size:11px;color:#3B82F6;margin-bottom:8px">' + escapeHtml(diff.path) + '</div>';
  (diff.hunks || []).forEach(h => {
    html += '<div style="background:var(--diff-ctx-bg);border-radius:4px;margin-bottom:6px;overflow:hidden">';
    html += '<div style="background:var(--diff-hunk-header);padding:4px 8px;font-size:10px;color:var(--text-muted)">@@ -' + h.old_start + ' +' + h.new_start + ' @@</div>';
    for (let li = 0; li < (h.lines || []).length; li++) {
      const l = h.lines[li], next = h.lines[li+1];
      if (l.op === 'del' && next && next.op === 'add') {
        const wd = wordDiff(l.text, next.text);
        html += '<div style="background:var(--diff-del-bg);padding:2px 8px;font-size:11px;color:var(--diff-del-text)">− ' + wd.delHtml + '</div>';
        html += '<div style="background:var(--diff-add-bg);padding:2px 8px;font-size:11px;color:var(--diff-add-text)">+ ' + wd.addHtml + '</div>';
        li++;
      } else if (l.op === 'add') {
        html += '<div style="background:var(--diff-add-bg);padding:2px 8px;font-size:11px;color:var(--diff-add-text)">+ ' + escapeHtml(l.text) + '</div>';
      } else if (l.op === 'del') {
        html += '<div style="background:var(--diff-del-bg);padding:2px 8px;font-size:11px;color:var(--diff-del-text);text-decoration:line-through">− ' + escapeHtml(l.text) + '</div>';
      } else {
        html += '<div style="padding:2px 8px;font-size:11px;color:var(--diff-ctx-text)">  ' + escapeHtml(l.text) + '</div>';
      }
    }
    html += '</div>';
  });
  insp.innerHTML = html;
}
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text}) });
}
function stopRun() {
  btn.textContent = '停止中…';
  btn.onclick = null;
  fetch('/api/interrupt', { method: 'POST' });
}
function toggleMode(current) {
  const target = current === 'ask' ? '/mode plan' : '/mode ask';
  fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text: target}) });
}
btn.onclick = sendMsg;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
</script>
</body>
</html>
